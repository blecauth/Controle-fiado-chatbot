<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>FiadoBot</title>
    <style>
        /* ===== DESIGN SYSTEM ===== */
        :root {
            /* Cores Primárias */
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            
            /* Status */
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #22c55e;
            --success-light: #dcfce7;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --neutral: #6b7280;
            --neutral-light: #f3f4f6;
            
            /* Fundos */
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-elevated: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            
            /* Safe Areas */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            
            /* Sombras */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            
            /* Bordas */
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-elevated: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text-primary);
        }

        /* ===== APP SHELL ===== */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--primary-gradient);
            padding: 16px 20px;
            padding-top: calc(16px + var(--safe-top));
            color: white;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .header-text p {
            font-size: 0.75rem;
            opacity: 0.9;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .icon-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 12px 16px;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            position: relative;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 2px 2px 0 0;
        }

        .tab-badge {
            background: var(--danger);
            color: white;
            font-size: 0.625rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* ===== CONTENT AREA ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-body {
            padding: 16px 20px;
        }

        /* ===== METRICS GRID ===== */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px 12px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--neutral);
        }

        .metric-card.danger::before { background: var(--danger); }
        .metric-card.success::before { background: var(--success); }
        .metric-card.warning::before { background: var(--warning); }

        .metric-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== CLIENT LIST ===== */
        .client-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .client-item {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .client-item:active {
            transform: scale(0.98);
            box-shadow: var(--shadow);
        }

        .client-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--neutral);
        }

        .client-item.debt::before { background: var(--danger); }
        .client-item.credit::before { background: var(--success); }

        .client-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .client-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .client-meta {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .client-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .client-balance {
            text-align: right;
        }

        .client-balance .amount {
            font-size: 1.125rem;
            font-weight: 700;
        }

        .client-balance .amount.debt { color: var(--danger); }
        .client-balance .amount.credit { color: var(--success); }
        .client-balance .amount.zero { color: var(--neutral); }

        .client-balance .label {
            font-size: 0.625rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        .client-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .action-btn-small {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .action-btn-small.primary {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        .action-btn-small.success {
            background: var(--success-light);
            color: var(--success);
        }

        .action-btn-small.danger {
            background: var(--danger-light);
            color: var(--danger);
        }

        .action-btn-small:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* ===== TIMELINE ===== */
        .timeline {
            position: relative;
            padding-left: 24px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }

        .timeline-date {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-left: -24px;
            padding-left: 24px;
            position: relative;
        }

        .timeline-date::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 16px;
            padding-left: 16px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 2px var(--border);
        }

        .timeline-item.sale::before {
            background: var(--danger);
            box-shadow: 0 0 0 2px var(--danger-light);
        }

        .timeline-item.payment::before {
            background: var(--success);
            box-shadow: 0 0 0 2px var(--success-light);
        }

        .timeline-item.credit::before {
            background: var(--warning);
            box-shadow: 0 0 0 2px var(--warning-light);
        }

        .timeline-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 12px 16px;
            box-shadow: var(--shadow-sm);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .timeline-client {
            font-weight: 600;
            color: var(--text-primary);
        }

        .timeline-amount {
            font-weight: 700;
            font-size: 1rem;
        }

        .timeline-amount.sale { color: var(--danger); }
        .timeline-amount.payment { color: var(--success); }
        .timeline-amount.credit { color: var(--warning); }

        .timeline-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* ===== QUICK INPUT ===== */
        .quick-input {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: calc(12px + var(--safe-bottom));
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .main-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            font-size: 1rem;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        .main-input:focus {
            border-color: var(--primary);
            background: var(--surface);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
            box-shadow: var(--shadow-sm);
        }

        /* ===== SUGGESTIONS ===== */
        .suggestions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .suggestion-chip {
            padding: 8px 14px;
            background: var(--neutral-light);
            border: none;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .suggestion-chip:active {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 0.875rem;
            max-width: 280px;
            margin: 0 auto;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-secondary {
            background: var(--neutral-light);
            color: var(--text-secondary);
        }

        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
        }

        /* ===== FORM ELEMENTS ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: var(--surface);
        }

        /* ===== SEARCH ===== */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            font-size: 0.875rem;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--text-tertiary);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-xl);
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        /* ===== UTILITIES ===== */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mb-0 { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-title">
                    <div class="header-icon">💰</div>
                    <div class="header-text">
                        <h1>FiadoBot</h1>
                        <p>Controle de Vendas</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleTheme()" title="Tema">🌙</button>
                    <button class="icon-btn" onclick="showSettings()" title="Configurações">⚙️</button>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')" data-tab="dashboard">
                📊 Resumo
            </button>
            <button class="tab" onclick="switchTab('clients')" data-tab="clients">
                👥 Clientes <span class="tab-badge" id="clientCount">0</span>
            </button>
            <button class="tab" onclick="switchTab('history')" data-tab="history">
                📝 Registros
            </button>
        </nav>

        <!-- Content -->
        <main class="content">
            <!-- Dashboard View -->
            <div class="view active" id="dashboardView">
                <div class="metrics-grid">
                    <div class="metric-card danger">
                        <div class="metric-icon">📤</div>
                        <div class="metric-value" id="metricDebt">R$ 0</div>
                        <div class="metric-label">A Receber</div>
                    </div>
                    <div class="metric-card success">
                        <div class="metric-icon">📥</div>
                        <div class="metric-value" id="metricCredit">R$ 0</div>
                        <div class="metric-label">Créditos</div>
                    </div>
                    <div class="metric-card warning">
                        <div class="metric-icon">👥</div>
                        <div class="metric-value" id="metricClients">0</div>
                        <div class="metric-label">Clientes</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">⚠️ Atenção</span>
                    </div>
                    <div class="card-body" id="attentionList">
                        <div class="empty-state">
                            <div class="empty-icon">✅</div>
                            <div class="empty-title">Tudo em ordem!</div>
                            <div class="empty-desc">Nenhum cliente com pendências urgentes.</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">💎 Top Clientes</span>
                    </div>
                    <div class="card-body" id="topClients">
                        <div class="empty-state">
                            <div class="empty-icon">👤</div>
                            <div class="empty-title">Sem dados</div>
                            <div class="empty-desc">Adicione vendas para ver estatísticas.</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Clients View -->
            <div class="view" id="clientsView">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="clientSearch" placeholder="Buscar cliente..." oninput="filterClients()">
                </div>
                <div class="client-list" id="clientList">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- History View -->
            <div class="view" id="historyView">
                <div class="timeline" id="timeline">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>

        <!-- Quick Input -->
        <div class="quick-input">
            <div class="input-row">
                <div class="input-wrapper">
                    <input type="text" class="main-input" id="quickCommand" placeholder="Ex: joao adc 50" onkeypress="if(event.key==='Enter')processQuickCommand()">
                </div>
                <button class="send-btn" onclick="processQuickCommand()">➤</button>
            </div>
            <div class="suggestions" id="suggestions">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Edit Client Modal -->
        <div class="modal-overlay" id="editModal">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">✏️ Editar Cliente</div>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editOldName">
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-input" id="editName">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telefone</label>
                        <input type="tel" class="form-input" id="editPhone" placeholder="(11) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label class="form-label">WhatsApp</label>
                        <input type="tel" class="form-input" id="editWhatsApp" placeholder="(11) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Observações</label>
                        <input type="text" class="form-input" id="editNotes" placeholder="Endereço, referência...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancelar</button>
                    <button class="btn btn-primary" onclick="saveClient()">Salvar</button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">⚙️ Configurações</div>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="exportData()" style="width:100%;margin-bottom:8px;">📤 Exportar Dados</button>
                        <input type="file" id="importFile" hidden accept=".json" onchange="importData(this)">
                        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="width:100%;margin-bottom:8px;">📥 Importar Dados</button>
                        <button class="btn btn-danger" onclick="confirmReset()" style="width:100%;">🗑️ Limpar Tudo</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal('settingsModal')">Fechar</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ===== DATA LAYER =====
        const DB_KEY = 'fiadobot_v3';
        
        function getDB() {
            const data = localStorage.getItem(DB_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveDB(data) {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
            updateUI();
        }

        function getClient(name) {
            const db = getDB();
            if (!db[name]) {
                db[name] = {
                    name: name,
                    balance: 0,
                    transactions: [],
                    phone: '',
                    whatsapp: '',
                    notes: '',
                    created: new Date().toISOString()
                };
            }
            return db[name];
        }

        // ===== UI UPDATES =====
        function updateUI() {
            updateMetrics();
            updateClientList();
            updateTimeline();
            updateSuggestions();
            updateClientCount();
        }

        function updateMetrics() {
            const db = getDB();
            let debt = 0, credit = 0, count = 0;
            const attention = [];

            Object.values(db).forEach(client => {
                count++;
                if (client.balance > 0) {
                    debt += client.balance;
                    if (client.balance > 100) { // Alerta para valores altos
                        attention.push(client);
                    }
                } else if (client.balance < 0) {
                    credit += Math.abs(client.balance);
                }
            });

            document.getElementById('metricDebt').textContent = formatMoney(debt);
            document.getElementById('metricCredit').textContent = formatMoney(credit);
            document.getElementById('metricClients').textContent = count;

            // Attention list
            const attentionEl = document.getElementById('attentionList');
            if (attention.length === 0) {
                attentionEl.innerHTML = `
                    <div class="empty-state mb-0">
                        <div class="empty-icon">✅</div>
                        <div class="empty-title">Tudo em ordem!</div>
                        <div class="empty-desc">Nenhum cliente com pendências urgentes.</div>
                    </div>`;
            } else {
                attentionEl.innerHTML = attention.map(c => `
                    <div class="client-item debt" onclick="showClientDetail('${c.name}')" style="margin-bottom:8px;">
                        <div class="client-main">
                            <div class="client-info">
                                <h3>${capitalize(c.name)}</h3>
                            </div>
                            <div class="client-balance">
                                <div class="amount debt">${formatMoney(c.balance)}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Top clients (maior movimentação)
            const sorted = Object.values(db).sort((a, b) => b.transactions.length - a.transactions.length).slice(0, 3);
            const topEl = document.getElementById('topClients');
            if (sorted.length === 0 || sorted[0].transactions.length === 0) {
                topEl.innerHTML = `
                    <div class="empty-state mb-0">
                        <div class="empty-icon">👤</div>
                        <div class="empty-title">Sem dados</div>
                        <div class="empty-desc">Adicione vendas para ver estatísticas.</div>
                    </div>`;
            } else {
                topEl.innerHTML = sorted.map(c => `
                    <div class="client-item ${c.balance > 0 ? 'debt' : c.balance < 0 ? 'credit' : ''}" onclick="showClientDetail('${c.name}')" style="margin-bottom:8px;">
                        <div class="client-main">
                            <div class="client-info">
                                <h3>${capitalize(c.name)}</h3>
                                <div class="client-meta">
                                    <span>📝 ${c.transactions.length} registros</span>
                                </div>
                            </div>
                            <div class="client-balance">
                                <div class="amount ${c.balance > 0 ? 'debt' : c.balance < 0 ? 'credit' : 'zero'}">
                                    ${c.balance < 0 ? '+' : ''}${formatMoney(Math.abs(c.balance))}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function updateClientList(filter = '') {
            const db = getDB();
            const clients = Object.values(db).sort((a, b) => {
                // Devedores primeiro, depois por nome
                if (a.balance > 0 && b.balance <= 0) return -1;
                if (a.balance <= 0 && b.balance > 0) return 1;
                return a.name.localeCompare(b.name);
            }).filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));

            const list = document.getElementById('clientList');
            
            if (clients.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">Nenhum cliente</div>
                        <div class="empty-desc">${filter ? 'Tente outra busca.' : 'Adicione seu primeiro cliente usando o campo abaixo.'}</div>
                    </div>`;
                return;
            }

            list.innerHTML = clients.map(c => `
                <div class="client-item ${c.balance > 0 ? 'debt' : c.balance < 0 ? 'credit' : ''}" onclick="showClientDetail('${c.name}')">
                    <div class="client-main">
                        <div class="client-info">
                            <h3>${capitalize(c.name)}</h3>
                            <div class="client-meta">
                                ${c.phone ? `<span>📞 ${c.phone}</span>` : ''}
                                ${c.whatsapp ? `<span>💬 ${c.whatsapp}</span>` : ''}
                                <span>📝 ${c.transactions.length}</span>
                            </div>
                        </div>
                        <div class="client-balance">
                            <div class="amount ${c.balance > 0 ? 'debt' : c.balance < 0 ? 'credit' : 'zero'}">
                                ${c.balance < 0 ? '+' : ''}${formatMoney(Math.abs(c.balance))}
                            </div>
                            <div class="label">${c.balance < 0 ? 'CRÉDITO' : c.balance > 0 ? 'DEVENDO' : 'QUITADO'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateTimeline() {
            const db = getDB();
            const allTransactions = [];
            
            Object.values(db).forEach(client => {
                client.transactions.forEach(t => {
                    allTransactions.push({
                        ...t,
                        clientName: client.name,
                        clientPhone: client.phone,
                        clientWhatsApp: client.whatsapp
                    });
                });
            });

            allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            const timeline = document.getElementById('timeline');
            
            if (allTransactions.length === 0) {
                timeline.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">Sem registros</div>
                        <div class="empty-desc">As transações aparecerão aqui.</div>
                    </div>`;
                return;
            }

            // Agrupar por data
            const grouped = {};
            allTransactions.forEach(t => {
                const date = new Date(t.date).toLocaleDateString('pt-BR');
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(t);
            });

            timeline.innerHTML = Object.entries(grouped).map(([date, items]) => `
                <div class="timeline-date">${date === new Date().toLocaleDateString('pt-BR') ? 'Hoje' : date}</div>
                ${items.map(t => `
                    <div class="timeline-item ${t.type}">
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <span class="timeline-client">${capitalize(t.clientName)}</span>
                                <span class="timeline-amount ${t.type}">
                                    ${t.type === 'sale' || t.type === 'adc' ? '+' : t.type === 'credit_use' ? '💳' : '-'}${formatMoney(t.value)}
                                </span>
                            </div>
                            <div class="timeline-desc">${t.description || (t.type === 'sale' || t.type === 'adc' ? 'Venda fiado' : t.type === 'credit_use' ? 'Uso de crédito' : 'Pagamento recebido')}</div>
                            ${t.clientWhatsApp && t.type !== 'payment' ? `
                                <button class="action-btn-small primary" style="margin-top:8px;width:100%;" onclick="event.stopPropagation();sendWhatsApp('${t.clientWhatsApp}', '${t.clientName}', ${t.value})">
                                    💬 Enviar comprovante
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `).join('')}
            `).join('');
        }

        function updateSuggestions() {
            const db = getDB();
            const clients = Object.keys(db).slice(0, 3);
            const suggestions = document.getElementById('suggestions');
            
            const cmds = [
                ...clients.map(c => `${c} adc `),
                ...clients.map(c => `${c} pg `),
                'clientes', 'resumo'
            ].slice(0, 5);

            suggestions.innerHTML = cmds.map(cmd => `
                <button class="suggestion-chip" onclick="setCommand('${cmd}')">${cmd}</button>
            `).join('');
        }

        function updateClientCount() {
            const count = Object.keys(getDB()).length;
            document.getElementById('clientCount').textContent = count;
        }

        // ===== ACTIONS =====
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'View').classList.add('active');
            
            updateUI();
        }

        function processQuickCommand() {
            const input = document.getElementById('quickCommand');
            const cmd = input.value.trim().toLowerCase();
            if (!cmd) return;

            const parts = cmd.split(/\s+/);
            
            // Comandos especiais
            if (cmd === 'clientes' || cmd === 'cliente') {
                switchTab('clients');
                input.value = '';
                return;
            }
            if (cmd === 'resumo' || cmd === 'dashboard') {
                switchTab('dashboard');
                input.value = '';
                return;
            }
            if (cmd === 'historico' || cmd === 'registros') {
                switchTab('history');
                input.value = '';
                return;
            }

            // Operações financeiras
            if (parts.length >= 3) {
                const name = parts[0];
                const action = parts[1];
                const value = parseFloat(parts[2].replace(',', '.'));

                if (isNaN(value) || value <= 0) {
                    showToast('Valor inválido', 'error');
                    return;
                }

                const db = getDB();
                const client = getClient(name);

                if (action === 'adc' || action === 'add') {
                    // Verificar crédito primeiro
                    let creditUsed = 0;
                    let remainingValue = value;

                    if (client.balance < 0) {
                        const credit = Math.abs(client.balance);
                        if (credit >= value) {
                            // Crédito cobre tudo
                            client.balance += value;
                            creditUsed = value;
                            remainingValue = 0;
                            
                            client.transactions.push({
                                type: 'credit_use',
                                value: value,
                                date: new Date().toISOString(),
                                description: `Usou ${formatMoney(value)} de crédito`
                            });
                        } else {
                            // Crédito parcial
                            creditUsed = credit;
                            remainingValue = value - credit;
                            client.balance = 0;
                            
                            client.transactions.push({
                                type: 'credit_use',
                                value: credit,
                                date: new Date().toISOString(),
                                description: `Usou ${formatMoney(credit)} de crédito`
                            });
                        }
                    }

                    // Adiciona restante se houver
                    if (remainingValue > 0) {
                        client.balance += remainingValue;
                        client.transactions.push({
                            type: 'adc',
                            value: remainingValue,
                            date: new Date().toISOString(),
                            description: creditUsed > 0 ? 'Venda (usou crédito)' : 'Venda fiado'
                        });
                    }

                    db[name] = client;
                    saveDB(db);

                    if (creditUsed > 0) {
                        showToast(`💳 Usou ${formatMoney(creditUsed)} de crédito. Adicionado ${formatMoney(remainingValue)}`, 'success');
                    } else {
                        showToast(`✅ Adicionado ${formatMoney(value)} para ${capitalize(name)}`, 'success');
                    }

                } else if (action === 'pg' || action === 'pag') {
                    client.balance -= value;
                    client.transactions.push({
                        type: 'payment',
                        value: value,
                        date: new Date().toISOString(),
                        description: 'Pagamento recebido'
                    });

                    db[name] = client;
                    saveDB(db);

                    if (client.balance < 0) {
                        showToast(`💰 ${capitalize(name)} tem ${formatMoney(Math.abs(client.balance))} de crédito`, 'success');
                    } else if (client.balance === 0) {
                        showToast(`✅ ${capitalize(name)} quitou a dívida!`, 'success');
                    } else {
                        showToast(`✅ Pagamento de ${formatMoney(value)} registrado`, 'success');
                    }
                }

                input.value = '';
                updateUI();
            } else if (parts.length === 1 && parts[0]) {
                // Mostrar detalhes do cliente
                showClientDetail(parts[0]);
                input.value = '';
            }
        }

        function showClientDetail(name) {
            const client = getClient(name);
            const balance = client.balance;
            
            // Preencher modal de edição
            document.getElementById('editOldName').value = name;
            document.getElementById('editName').value = name;
            document.getElementById('editPhone').value = client.phone || '';
            document.getElementById('editWhatsApp').value = client.whatsapp || '';
            document.getElementById('editNotes').value = client.notes || '';
            
            // Mostrar modal
            document.getElementById('editModal').classList.add('active');
        }

        function saveClient() {
            const oldName = document.getElementById('editOldName').value;
            const newName = document.getElementById('editName').value.trim().toLowerCase();
            const phone = document.getElementById('editPhone').value.trim();
            const whatsapp = document.getElementById('editWhatsApp').value.trim();
            const notes = document.getElementById('editNotes').value.trim();

            if (!newName) {
                showToast('Nome é obrigatório', 'error');
                return;
            }

            const db = getDB();
            
            if (oldName !== newName && db[newName]) {
                showToast('Já existe cliente com este nome', 'error');
                return;
            }

            const clientData = db[oldName] || getClient(oldName);
            clientData.phone = phone;
            clientData.whatsapp = whatsapp;
            clientData.notes = notes;

            if (oldName !== newName) {
                db[newName] = clientData;
                delete db[oldName];
            } else {
                db[oldName] = clientData;
            }

            saveDB(db);
            closeModal('editModal');
            showToast('✅ Cliente atualizado', 'success');
        }

        function deleteClient(name) {
            if (!confirm(`Excluir ${capitalize(name)} permanentemente?`)) return;
            
            const db = getDB();
            delete db[name];
            saveDB(db);
            
            closeModal('editModal');
            showToast('🗑️ Cliente excluído', 'success');
        }

        function sendWhatsApp(number, name, value) {
            const clean = number.replace(/\D/g, '');
            const msg = `Olá ${capitalize(name)}! Recebemos seu pagamento de ${formatMoney(value)}. Obrigado!`;
            window.open(`https://wa.me/55${clean}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ===== MODAL & UTILS =====
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function setCommand(cmd) {
            const input = document.getElementById('quickCommand');
            input.value = cmd;
            input.focus();
        }

        function filterClients() {
            const search = document.getElementById('clientSearch').value;
            updateClientList(search);
        }

        function toggleTheme() {
            const isDark = document.documentElement.hasAttribute('data-theme');
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function formatMoney(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // ===== EXPORT/IMPORT =====
        function exportData() {
            const data = JSON.stringify(getDB(), null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fiadobot_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('📤 Backup exportado', 'success');
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm(`Importar ${Object.keys(data).length} clientes? Isso substituirá os dados atuais.`)) {
                        saveDB(data);
                        showToast('✅ Dados importados', 'success');
                        closeModal('settingsModal');
                    }
                } catch (err) {
                    showToast('❌ Arquivo inválido', 'error');
                }
            };
            reader.readAsText(file);
        }

        function confirmReset() {
            if (!confirm('⚠️ Todos os dados serão apagados. Faça backup primeiro!\n\nContinuar?')) return;
            if (!confirm('Tem certeza? Esta ação não pode ser desfeita!')) return;
            
            localStorage.removeItem(DB_KEY);
            updateUI();
            showToast('🗑️ Dados apagados', 'success');
            closeModal('settingsModal');
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            
            // Fechar modais ao clicar fora
            document.querySelectorAll('.modal-overlay').forEach(m => {
                m.addEventListener('click', (e) => {
                    if (e.target === m) m.classList.remove('active');
                });
            });
        });
    </script>
</body>
</html>
