<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>FiadoBot</title>
    <style>
        /* ===== DESIGN SYSTEM ===== */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #22c55e;
            --success-light: #dcfce7;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --neutral: #6b7280;
            --neutral-light: #f3f4f6;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text-primary);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* Header */
        .header {
            background: var(--primary-gradient);
            padding: 16px 20px;
            padding-top: calc(16px + var(--safe-top));
            color: white;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .header-text p {
            font-size: 0.75rem;
            opacity: 0.9;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 12px 16px;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            position: relative;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 2px 2px 0 0;
        }

        .tab-badge {
            background: var(--danger);
            color: white;
            font-size: 0.625rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-body {
            padding: 16px 20px;
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px 12px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--neutral);
        }

        .metric-card.danger::before { background: var(--danger); }
        .metric-card.success::before { background: var(--success); }
        .metric-card.warning::before { background: var(--warning); }
        .metric-card.info::before { background: var(--primary); }

        .metric-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Client List */
        .client-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .client-item {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .client-item:active {
            transform: scale(0.98);
        }

        .client-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--neutral);
        }

        .client-item.debt::before { background: var(--danger); }
        .client-item.credit::before { background: var(--success); }
        .client-item.new::before { background: var(--primary); }

        .client-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .client-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .client-meta {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .client-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .client-balance {
            text-align: right;
        }

        .client-balance .amount {
            font-size: 1.125rem;
            font-weight: 700;
        }

        .client-balance .amount.debt { color: var(--danger); }
        .client-balance .amount.credit { color: var(--success); }
        .client-balance .amount.zero { color: var(--neutral); }

        .client-balance .label {
            font-size: 0.625rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        .new-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-size: 0.625rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 600;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 24px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }

        .timeline-date {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-left: -24px;
            padding-left: 24px;
            position: relative;
        }

        .timeline-date::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 16px;
            padding-left: 16px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 2px var(--border);
        }

        .timeline-item.sale::before {
            background: var(--danger);
            box-shadow: 0 0 0 2px var(--danger-light);
        }

        .timeline-item.payment::before {
            background: var(--success);
            box-shadow: 0 0 0 2px var(--success-light);
        }

        .timeline-item.credit::before {
            background: var(--warning);
            box-shadow: 0 0 0 2px var(--warning-light);
        }

        .timeline-item.new::before {
            background: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .timeline-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 12px 16px;
            box-shadow: var(--shadow-sm);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .timeline-client {
            font-weight: 600;
            color: var(--text-primary);
        }

        .timeline-amount {
            font-weight: 700;
            font-size: 1rem;
        }

        .timeline-amount.sale { color: var(--danger); }
        .timeline-amount.payment { color: var(--success); }
        .timeline-amount.credit { color: var(--warning); }
        .timeline-amount.new { color: var(--primary); }

        .timeline-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Quick Input */
        .quick-input {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: calc(12px + var(--safe-bottom));
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .main-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            font-size: 1rem;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        .main-input:focus {
            border-color: var(--primary);
            background: var(--surface);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Suggestions */
        .suggestions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .suggestion-chip {
            padding: 8px 14px;
            background: var(--neutral-light);
            border: none;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .suggestion-chip:active {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 0.875rem;
            max-width: 280px;
            margin: 0 auto;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-secondary {
            background: var(--neutral-light);
            color: var(--text-secondary);
        }

        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: var(--surface);
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            font-size: 0.875rem;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--text-tertiary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-xl);
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-title">
                    <div class="header-icon">💰</div>
                    <div class="header-text">
                        <h1>FiadoBot</h1>
                        <p>Controle de Vendas</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
                    <button class="icon-btn" onclick="showSettings()">⚙️</button>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')" data-tab="dashboard">
                📊 Resumo
            </button>
            <button class="tab" onclick="switchTab('clients')" data-tab="clients">
                👥 Clientes <span class="tab-badge" id="clientCount">0</span>
            </button>
            <button class="tab" onclick="switchTab('history')" data-tab="history">
                📝 Registros
            </button>
        </nav>

        <!-- Content -->
        <main class="content">
            <!-- Dashboard -->
            <div class="view active" id="dashboardView">
                <div class="metrics-grid">
                    <div class="metric-card danger">
                        <div class="metric-icon">📤</div>
                        <div class="metric-value" id="metricDebt">R$ 0</div>
                        <div class="metric-label">A Receber</div>
                    </div>
                    <div class="metric-card success">
                        <div class="metric-icon">📥</div>
                        <div class="metric-value" id="metricCredit">R$ 0</div>
                        <div class="metric-label">Créditos</div>
                    </div>
                    <div class="metric-card info">
                        <div class="metric-icon">👥</div>
                        <div class="metric-value" id="metricClients">0</div>
                        <div class="metric-label">Clientes</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">🆕 Clientes Novos</span>
                    </div>
                    <div class="card-body" id="newClientsList">
                        <div class="empty-state">
                            <div class="empty-icon">👤</div>
                            <div class="empty-title">Nenhum cliente novo</div>
                            <div class="empty-desc">Use "add nome" para cadastrar.</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">⚠️ Devedores</span>
                    </div>
                    <div class="card-body" id="attentionList">
                        <div class="empty-state">
                            <div class="empty-icon">✅</div>
                            <div class="empty-title">Tudo em ordem!</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Clients -->
            <div class="view" id="clientsView">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="clientSearch" placeholder="Buscar cliente..." oninput="filterClients()">
                </div>
                <div class="client-list" id="clientList"></div>
            </div>

            <!-- History -->
            <div class="view" id="historyView">
                <div class="timeline" id="timeline"></div>
            </div>
        </main>

        <!-- Quick Input -->
        <div class="quick-input">
            <div class="input-row">
                <div class="input-wrapper">
                    <input type="text" class="main-input" id="quickCommand" placeholder="Ex: add joao, joao adc 50, maria pg 30" onkeypress="if(event.key==='Enter')processQuickCommand()">
                </div>
                <button class="send-btn" onclick="processQuickCommand()">➤</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Edit Modal -->
        <div class="modal-overlay" id="editModal">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">✏️ Editar Cliente</div>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editOldName">
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-input" id="editName">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telefone</label>
                        <input type="tel" class="form-input" id="editPhone" placeholder="(11) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label class="form-label">WhatsApp</label>
                        <input type="tel" class="form-input" id="editWhatsApp" placeholder="(11) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Observações</label>
                        <input type="text" class="form-input" id="editNotes" placeholder="Endereço, referência...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" onclick="deleteCurrentClient()">Excluir</button>
                    <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancelar</button>
                    <button class="btn btn-primary" onclick="saveClient()">Salvar</button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">⚙️ Configurações</div>
                </div>
                <div class="modal-body">
                    <button class="btn btn-primary" onclick="exportData()" style="width:100%;margin-bottom:8px;">📤 Exportar</button>
                    <input type="file" id="importFile" hidden accept=".json" onchange="importData(this)">
                    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="width:100%;margin-bottom:8px;">📥 Importar</button>
                    <button class="btn btn-danger" onclick="confirmReset()" style="width:100%;">🗑️ Limpar Tudo</button>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal('settingsModal')">Fechar</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        const DB_KEY = 'fiadobot_v4';

        function getDB() {
            return JSON.parse(localStorage.getItem(DB_KEY) || '{}');
        }

        function saveDB(data) {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
            updateUI();
        }

        function getClient(name, create = false) {
            const db = getDB();
            if (!db[name] && create) {
                db[name] = {
                    name: name,
                    balance: 0,
                    transactions: [],
                    phone: '',
                    whatsapp: '',
                    notes: '',
                    created: new Date().toISOString(),
                    isNew: true  // Flag para clientes recém-criados
                };
                saveDB(db);
            }
            return db[name];
        }

        function updateUI() {
            updateMetrics();
            updateClientList();
            updateTimeline();
            updateSuggestions();
            document.getElementById('clientCount').textContent = Object.keys(getDB()).length;
        }

        function updateMetrics() {
            const db = getDB();
            let debt = 0, credit = 0;
            const newClients = [];
            const debtors = [];

            Object.values(db).forEach(c => {
                if (c.balance > 0) {
                    debt += c.balance;
                    if (c.balance > 50) debtors.push(c);
                } else if (c.balance < 0) {
                    credit += Math.abs(c.balance);
                }
                
                // Clientes novos (criados nas últimas 24h ou com flag isNew)
                if (c.isNew || (c.created && new Date() - new Date(c.created) < 24*60*60*1000)) {
                    newClients.push(c);
                }
            });

            document.getElementById('metricDebt').textContent = formatMoney(debt);
            document.getElementById('metricCredit').textContent = formatMoney(credit);
            document.getElementById('metricClients').textContent = Object.keys(db).length;

            // Lista de novos clientes
            const newEl = document.getElementById('newClientsList');
            if (newClients.length === 0) {
                newEl.innerHTML = `
                    <div class="empty-state" style="padding: 30px;">
                        <div class="empty-icon">👤</div>
                        <div class="empty-title">Nenhum cliente novo</div>
                        <div class="empty-desc">Use <code>add nome</code> para cadastrar.</div>
                    </div>`;
            } else {
                newEl.innerHTML = newClients.map(c => `
                    <div class="client-item new" onclick="showClientDetail('${c.name}')" style="margin-bottom:8px;">
                        <div class="client-main">
                            <div class="client-info">
                                <h3>${capitalize(c.name)} <span class="new-badge">NOVO</span></h3>
                                <div class="client-meta">
                                    <span>Cadastrado ${formatDate(c.created)}</span>
                                </div>
                            </div>
                            <div class="client-balance">
                                <div class="amount zero">${formatMoney(0)}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Lista de devedores
            const debtEl = document.getElementById('attentionList');
            if (debtors.length === 0) {
                debtEl.innerHTML = `
                    <div class="empty-state" style="padding: 30px;">
                        <div class="empty-icon">✅</div>
                        <div class="empty-title">Tudo em ordem!</div>
                    </div>`;
            } else {
                debtEl.innerHTML = debtors.map(c => `
                    <div class="client-item debt" onclick="showClientDetail('${c.name}')" style="margin-bottom:8px;">
                        <div class="client-main">
                            <div class="client-info">
                                <h3>${capitalize(c.name)}</h3>
                            </div>
                            <div class="client-balance">
                                <div class="amount debt">${formatMoney(c.balance)}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function updateClientList(filter = '') {
            const db = getDB();
            const clients = Object.values(db)
                .sort((a, b) => {
                    if (a.balance > 0 && b.balance <= 0) return -1;
                    if (a.balance <= 0 && b.balance > 0) return 1;
                    return a.name.localeCompare(b.name);
                })
                .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));

            const list = document.getElementById('clientList');
            
            if (clients.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">${filter ? 'Nenhum resultado' : 'Sem clientes'}</div>
                        <div class="empty-desc">${filter ? 'Tente outro termo.' : 'Use <code>add nome</code> para começar.'}</div>
                    </div>`;
                return;
            }

            list.innerHTML = clients.map(c => {
                const isNew = c.isNew || (c.created && new Date() - new Date(c.created) < 24*60*60*1000);
                return `
                <div class="client-item ${c.balance > 0 ? 'debt' : c.balance < 0 ? 'credit' : isNew ? 'new' : ''}" onclick="showClientDetail('${c.name}')">
                    <div class="client-main">
                        <div class="client-info">
                            <h3>${capitalize(c.name)} ${isNew ? '<span class="new-badge">NOVO</span>' : ''}</h3>
                            <div class="client-meta">
                                ${c.phone ? `<span>📞 ${c.phone}</span>` : ''}
                                ${c.whatsapp ? `<span>💬 ${c.whatsapp}</span>` : ''}
                                <span>📝 ${c.transactions.length}</span>
                            </div>
                        </div>
                        <div class="client-balance">
                            <div class="amount ${c.balance > 0 ? 'debt' : c.balance < 0 ? 'credit' : 'zero'}">
                                ${c.balance < 0 ? '+' : ''}${formatMoney(Math.abs(c.balance))}
                            </div>
                            <div class="label">${c.balance < 0 ? 'CRÉDITO' : c.balance > 0 ? 'DEVENDO' : 'ZERADO'}</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function updateTimeline() {
            const db = getDB();
            const all = [];
            
            Object.values(db).forEach(c => {
                // Adicionar criação do cliente
                if (c.created) {
                    all.push({
                        type: 'new',
                        clientName: c.name,
                        value: 0,
                        date: c.created,
                        description: 'Cliente cadastrado'
                    });
                }
                
                c.transactions.forEach(t => {
                    all.push({...t, clientName: c.name, clientWhatsApp: c.whatsapp});
                });
            });

            all.sort((a, b) => new Date(b.date) - new Date(a.date));

            const timeline = document.getElementById('timeline');
            
            if (all.length === 0) {
                timeline.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">Sem registros</div>
                    </div>`;
                return;
            }

            const grouped = {};
            all.forEach(t => {
                const date = new Date(t.date).toLocaleDateString('pt-BR');
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(t);
            });

            timeline.innerHTML = Object.entries(grouped).map(([date, items]) => `
                <div class="timeline-date">${isToday(date) ? 'Hoje' : isYesterday(date) ? 'Ontem' : date}</div>
                ${items.map(t => `
                    <div class="timeline-item ${t.type}">
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <span class="timeline-client">${capitalize(t.clientName)}</span>
                                <span class="timeline-amount ${t.type}">
                                    ${t.type === 'new' ? '✨ NOVO' : 
                                      t.type === 'sale' || t.type === 'adc' ? '+' : 
                                      t.type === 'credit_use' ? '💳' : '-'}${t.value > 0 ? formatMoney(t.value) : ''}
                                </span>
                            </div>
                            <div class="timeline-desc">${t.description || 'Registro'}</div>
                        </div>
                    </div>
                `).join('')}
            `).join('');
        }

        function updateSuggestions() {
            const db = getDB();
            const names = Object.keys(db).slice(0, 3);
            const cmds = ['add ', ...names.map(n => `${n} adc `), ...names.map(n => `${n} pg `)];
            
            document.getElementById('suggestions').innerHTML = cmds.slice(0, 5).map(cmd => `
                <button class="suggestion-chip" onclick="setCommand('${cmd}')">${cmd}</button>
            `).join('');
        }

        // ===== COMMAND PROCESSING =====
        function processQuickCommand() {
            const input = document.getElementById('quickCommand');
            const cmd = input.value.trim().toLowerCase();
            if (!cmd) return;

            const parts = cmd.split(/\s+/);
            
            // Navegação
            if (cmd === 'clientes' || cmd === 'cliente') {
                switchTab('clients');
                input.value = '';
                return;
            }
            if (cmd === 'resumo' || cmd === 'dashboard') {
                switchTab('dashboard');
                input.value = '';
                return;
            }
            if (cmd === 'historico' || cmd === 'registros' || cmd === 'hist') {
                switchTab('history');
                input.value = '';
                return;
            }

            // ===== ADD CLIENTE =====
            if (parts[0] === 'add' && parts.length === 2) {
                const name = parts[1];
                const db = getDB();
                
                if (db[name]) {
                    showToast(`❌ Cliente "${capitalize(name)}" já existe`, 'error');
                    return;
                }
                
                // Criar cliente com saldo zerado
                db[name] = {
                    name: name,
                    balance: 0,
                    transactions: [],
                    phone: '',
                    whatsapp: '',
                    notes: '',
                    created: new Date().toISOString(),
                    isNew: true
                };
                
                saveDB(db);
                showToast(`✅ Cliente "${capitalize(name)}" cadastrado!`, 'success');
                input.value = '';
                switchTab('clients');
                return;
            }

            // Operações financeiras
            if (parts.length >= 3) {
                const name = parts[0];
                const action = parts[1];
                const value = parseFloat(parts[2].replace(',', '.'));

                if (isNaN(value) || value <= 0) {
                    showToast('Valor inválido', 'error');
                    return;
                }

                const db = getDB();
                let client = db[name];
                
                // Criar cliente automaticamente se não existir
                if (!client && (action === 'adc' || action === 'add')) {
                    if (confirm(`Cliente "${capitalize(name)}" não existe. Criar e adicionar venda?`)) {
                        client = {
                            name: name,
                            balance: 0,
                            transactions: [],
                            phone: '',
                            whatsapp: '',
                            notes: '',
                            created: new Date().toISOString(),
                            isNew: true
                        };
                    } else {
                        return;
                    }
                } else if (!client) {
                    showToast(`❌ Cliente "${capitalize(name)}" não encontrado. Use "add ${name}" para cadastrar.`, 'error');
                    return;
                }

                if (action === 'adc' || action === 'add') {
                    // Lógica de crédito
                    let creditUsed = 0;
                    let remaining = value;

                    if (client.balance < 0) {
                        const credit = Math.abs(client.balance);
                        if (credit >= value) {
                            client.balance += value;
                            creditUsed = value;
                            remaining = 0;
                            client.transactions.push({
                                type: 'credit_use',
                                value: value,
                                date: new Date().toISOString(),
                                description: `Usou ${formatMoney(value)} de crédito`
                            });
                        } else {
                            creditUsed = credit;
                            remaining = value - credit;
                            client.balance = 0;
                            client.transactions.push({
                                type: 'credit_use',
                                value: credit,
                                date: new Date().toISOString(),
                                description: `Usou ${formatMoney(credit)} de crédito`
                            });
                        }
                    }

                    if (remaining > 0) {
                        client.balance += remaining;
                        client.transactions.push({
                            type: 'adc',
                            value: remaining,
                            date: new Date().toISOString(),
                            description: creditUsed > 0 ? 'Venda (usou crédito)' : 'Venda fiado'
                        });
                    }

                    // Remove flag de novo após primeira transação
                    if (client.isNew && client.transactions.length > (creditUsed > 0 ? 1 : 0)) {
                        client.isNew = false;
                    }

                    db[name] = client;
                    saveDB(db);

                    if (creditUsed > 0) {
                        showToast(`💳 Usou ${formatMoney(creditUsed)} de crédito + ${formatMoney(remaining)} adicionado`, 'success');
                    } else {
                        showToast(`✅ ${formatMoney(value)} adicionado para ${capitalize(name)}`, 'success');
                    }

                } else if (action === 'pg' || action === 'pag') {
                    client.balance -= value;
                    client.transactions.push({
                        type: 'payment',
                        value: value,
                        date: new Date().toISOString(),
                        description: 'Pagamento recebido'
                    });

                    // Remove flag de novo se pagar
                    if (client.isNew) client.isNew = false;

                    db[name] = client;
                    saveDB(db);

                    if (client.balance < 0) {
                        showToast(`💰 ${capitalize(name)} tem ${formatMoney(Math.abs(client.balance))} de crédito!`, 'success');
                    } else if (client.balance === 0) {
                        showToast(`✅ ${capitalize(name)} quitou!`, 'success');
                    } else {
                        showToast(`✅ Pagamento de ${formatMoney(value)} registrado`, 'success');
                    }
                }

                input.value = '';
                return;
            }

            // Ver detalhes
            if (parts.length === 1 && parts[0]) {
                const name = parts[0];
                if (getDB()[name]) {
                    showClientDetail(name);
                    input.value = '';
                } else {
                    showToast(`❌ "${capitalize(name)}" não encontrado. Use "add ${name}" para cadastrar.`, 'error');
                }
            }
        }

        function showClientDetail(name) {
            const client = getClient(name);
            if (!client) return;
            
            document.getElementById('editOldName').value = name;
            document.getElementById('editName').value = name;
            document.getElementById('editPhone').value = client.phone || '';
            document.getElementById('editWhatsApp').value = client.whatsapp || '';
            document.getElementById('editNotes').value = client.notes || '';
            
            document.getElementById('editModal').classList.add('active');
        }

        function saveClient() {
            const oldName = document.getElementById('editOldName').value;
            const newName = document.getElementById('editName').value.trim().toLowerCase();
            
            if (!newName) {
                showToast('Nome é obrigatório', 'error');
                return;
            }

            const db = getDB();
            
            if (oldName !== newName && db[newName]) {
                showToast('Nome já existe', 'error');
                return;
            }

            const client = db[oldName];
            client.phone = document.getElementById('editPhone').value.trim();
            client.whatsapp = document.getElementById('editWhatsApp').value.trim();
            client.notes = document.getElementById('editNotes').value.trim();

            if (oldName !== newName) {
                db[newName] = client;
                delete db[oldName];
            }

            saveDB(db);
            closeModal('editModal');
            showToast('✅ Salvo', 'success');
        }

        function deleteCurrentClient() {
            const name = document.getElementById('editOldName').value;
            if (!confirm(`Excluir ${capitalize(name)}?`)) return;
            
            const db = getDB();
            delete db[name];
            saveDB(db);
            closeModal('editModal');
            showToast('🗑️ Excluído', 'success');
        }

        // ===== UTILS =====
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'View').classList.add('active');
            updateUI();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function setCommand(cmd) {
            const input = document.getElementById('quickCommand');
            input.value = cmd;
            input.focus();
        }

        function filterClients() {
            updateClientList(document.getElementById('clientSearch').value);
        }

        function toggleTheme() {
            document.documentElement.toggleAttribute('data-theme');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatMoney(v) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(v);
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: 'short'
            });
        }

        function capitalize(s) {
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        function isToday(dateStr) {
            return dateStr === new Date().toLocaleDateString('pt-BR');
        }

        function isYesterday(dateStr) {
            const y = new Date();
            y.setDate(y.getDate() - 1);
            return dateStr === y.toLocaleDateString('pt-BR');
        }

        // ===== EXPORT/IMPORT =====
        function exportData() {
            const data = JSON.stringify(getDB(), null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fiadobot_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('📤 Exportado', 'success');
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm(`Importar ${Object.keys(data).length} clientes?`)) {
                        saveDB(data);
                        showToast('✅ Importado', 'success');
                        closeModal('settingsModal');
                    }
                } catch {
                    showToast('❌ Arquivo inválido', 'error');
                }
            };
            reader.readAsText(file);
        }

        function confirmReset() {
            if (!confirm('⚠️ Apagar TUDO?')) return;
            if (!confirm('Tem certeza?')) return;
            
            localStorage.removeItem(DB_KEY);
            updateUI();
            showToast('🗑️ Apagado', 'success');
            closeModal('settingsModal');
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            document.querySelectorAll('.modal-overlay').forEach(m => {
                m.addEventListener('click', (e) => {
                    if (e.target === m) m.classList.remove('active');
                });
            });
        });
    </script>
</body>
</html>
